name: CI

# Runs on every PR and on pushes to main. Gates merges behind type safety,
# tests, build integrity, and dependency health so broken code cannot ship
# without an explicit override.
#
# Jobs run in parallel where possible. All use the same Node version pinned
# below. Caching is keyed on package-lock.json so cold installs only happen
# when dependencies actually change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit -p tsconfig.json

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --run

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      # Fail the build on any HIGH or CRITICAL advisory. Moderate issues only
      # produce a warning so everyday dependency updates don't block PRs.
      - run: npm audit --audit-level=high

  no-console:
    name: No console.* in server code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no console.* in app/api or server-only lib/
        run: |
          set -e
          # Collect every file containing a console.* call under app/api and lib.
          # Then exclude any file whose first few lines declare "use client" —
          # those run in the browser and rightfully use console.
          CANDIDATES=$(grep -rln "console\.\(log\|error\|warn\|info\|debug\)" app/api lib \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules || true)
          HITS=""
          for f in $CANDIDATES; do
            if head -5 "$f" | grep -q '"use client"'; then
              continue
            fi
            FILE_HITS=$(grep -n "console\.\(log\|error\|warn\|info\|debug\)" "$f" || true)
            if [ -n "$FILE_HITS" ]; then
              HITS="${HITS}${f}:"$'\n'"${FILE_HITS}"$'\n'
            fi
          done
          if [ -n "$HITS" ]; then
            echo "console.* found in server code — use lib/log.ts instead:"
            echo "$HITS"
            exit 1
          fi
          echo "no console.* in server code"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, audit, no-console]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      # Build with stub env vars so next can render server components that
      # read process.env at module load. Real secrets live in Vercel.
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-key
          NEXT_PUBLIC_APP_URL: https://stub.local
        run: npm run build
